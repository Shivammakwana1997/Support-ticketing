version: "3.9"

services:
  # ──────────────────────────────────────
  # Backend - FastAPI
  # ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: copilot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/copilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - copilot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────
  # Frontend - Next.js
  # ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: copilot-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    networks:
      - copilot-network
    restart: unless-stopped

  # ──────────────────────────────────────
  # Database - PostgreSQL + pgvector
  # ──────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: copilot-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - copilot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Redis - Cache & Queue
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: copilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - copilot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ──────────────────────────────────────
  # Workers - Background Jobs
  # ──────────────────────────────────────
  worker-ingestion:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: copilot-worker-ingestion
    command: python -m workers.ingestion_worker
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/copilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - copilot-network
    restart: unless-stopped

  worker-sla:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: copilot-worker-sla
    command: python -m workers.sla_worker
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/copilot
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - copilot-network
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  copilot-network:
    driver: bridge
